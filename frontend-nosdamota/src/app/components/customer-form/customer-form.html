<div class="card shadow-sm p-4">
  <h4 class="text-primary mb-3"><i class="bi bi-person-plus-fill"></i> Novo Cliente</h4>
  <div class="mb-3">
    <label class="form-label">Nome</label>
    <input type="text" [(ngModel)]="customer().name" class="form-control" placeholder="Ex: Arthur">
  </div>
  <div class="mb-3">
    <label class="form-label">E-mail</label>
    <input type="email" [(ngModel)]="customer().email" class="form-control" placeholder="arthur@email.com">
  </div>
  <div class="mb-3">
    <label class="form-label">Telefone</label>
    <input type="text" [(ngModel)]="customer().phone" class="form-control" placeholder="(41) 99999-9999">
  </div>
  <button (click)="save()" class="btn btn-primary w-100">
    Salvar no Sistema
  </button>
</div>
