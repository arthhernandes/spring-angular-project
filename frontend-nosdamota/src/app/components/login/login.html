<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <h1>Nós da Mota 🧶</h1>
      <p>Gestão de Encomendas</p>
    </div>

    <div *ngIf="sessionExpired" class="alert alert-warning animate-fade-in">
      <small>⚠️ Sua sessão expirou. Por favor, entre novamente.</small>
    </div>
    
    <div class="input-group">
      <label>Usuário</label>
      <input [(ngModel)]="loginData.username" name="username" type="text" placeholder="Digite seu usuário">
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input [(ngModel)]="loginData.password" name="password" type="password" placeholder="Digite sua senha" (keyup.enter)="handleLogin()">
    </div>
    
    <button class="btn-login" (click)="handleLogin()">Entrar</button>
    
    <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
  </div>
</div>
